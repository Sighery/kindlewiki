<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="shortcut icon" type="image/x-icon" href="https://kindlemodding.org/favicon.ico" sizes="512x512 256x256 192x192 128x128 96x96 64x64 48x48 32x32 16x16">
<link rel="icon" type="image/png" sizes="192x192" href="https://kindlemodding.org/logo-192.png">
<link rel="icon" type="image/png" sizes="48x48" href="https://kindlemodding.org/logo-48.png">
<link rel="apple-touch-icon" href="https://kindlemodding.org/logo.png" type="image/x-icon" sizes="1024x1024">
<link rel="apple-touch-icon" href="https://kindlemodding.org/logo-192.png" type="image/x-icon" sizes="192x192">

<meta name="twitter:site" content="Kindle Modding Wiki">

<meta property="og:title" content="KindleModding - {{.Title}}">
<meta name="twitter:title" content="KindleModding - {{.Title}}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{  .Permalink }}">
{{- with .Summary -}}
<meta name="description" content="{{.}}">
<meta property="og:description" content="{{.}}">
<meta name="twitter:description" content="{{.}}">
{{- end -}}
{{- with .Params.image -}}
  <meta property="og:image" content="{{ absURL . }}">
  <meta name="twitter:image:src" content="{{ absURL . }}">
  <meta name="twitter:card" content="summary_large_image">
{{- else -}}
  <meta property="og:image" content="{{absURL "logo.png"}}">
  <meta name="twitter:card" content="summary">
{{- end -}}
<meta name="theme-color" content="#5865F2">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

{{ partial "include-scss.html" "css/main" }}

<script>
  const baseUrl = "{{ .Site.BaseURL }}";
</script>

<script src="{{ .Site.BaseURL }}/assets/js/global.js"></script>
<script src="{{ .Site.BaseURL }}/assets/js/fluent_guide.js"></script>
<script src="{{ .Site.BaseURL }}/assets/js/search.js"></script>
